<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>北向结算单持仓看板</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --section: #eef2f7;
      --text: #1f2933;
      --muted: #697586;
      --line: #d9dee7;
      --long: #166534;
      --long-soft: #9bd7ad;
      --short: #b42318;
      --short-soft: #efaaa4;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      padding: 18px clamp(16px, 4vw, 36px) 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 { margin: 0 0 8px; font-size: clamp(20px, 3vw, 30px); letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; display: flex; flex-wrap: wrap; gap: 10px 18px; }
    main { padding: 18px clamp(12px, 3vw, 32px) 30px; }
    .section-block {
      margin-top: 18px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--section);
    }
    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0;
    }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .metric b { display: block; font-size: 20px; margin-top: 4px; }
    .metric span { color: var(--muted); font-size: 12px; }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 10px 0 14px;
    }
    .field {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .filter-summary {
      margin: -4px 0 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .filter-summary h2 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0;
    }
    .filter-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 10px;
    }
    .filter-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfe;
    }
    .filter-group .parent-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .filter-group strong { font-size: 13px; }
    .filter-group .tag {
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      background: #eef4ff;
      color: var(--accent);
      white-space: nowrap;
    }
    .account-tree {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .account-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }
    .account-pill.active {
      border-color: #9ec5fe;
      color: #174ea6;
      background: #eaf2ff;
      font-weight: 600;
    }
    .account-pill.inactive {
      opacity: 0.42;
      background: #f8fafc;
    }
    .account-pill.virtual::after {
      content: " 聚合";
      color: var(--muted);
      font-weight: 400;
    }
    .filter-group .empty { color: var(--muted); font-size: 12px; }
    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 0 10px;
      font: inherit;
    }
    button { cursor: pointer; color: var(--accent); }
    .chart-panel, .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .chart-wrap { overflow-x: auto; padding: 12px; }
    svg { display: block; min-width: 780px; }
    .axis { stroke: #4b5563; stroke-width: 1; }
    .grid { stroke: #edf0f5; stroke-width: 1; }
    .label { fill: #344054; font-size: 12px; }
    .small { fill: #697586; font-size: 11px; }
    .lot-tag { fill: #697586; font-size: 11px; font-weight: 600; }
    .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; padding: 10px 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    .swatch { width: 14px; height: 9px; display: inline-block; border-radius: 2px; margin-right: 5px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 9px 10px; border-top: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--panel); }
    th { color: var(--muted); font-weight: 600; background: #fbfcfe; }
    .expand-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      margin-right: 6px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 6px;
      line-height: 1;
    }
    .summary-row { cursor: pointer; }
    .summary-row:hover td { background: #f8fafc; }
    .detail-row td { background: #fbfcfe; color: #475467; }
    .detail-row td:first-child { padding-left: 44px; background: #fbfcfe; }
    .client-pill { color: #111827; font-weight: 600; }
    .source-note { color: var(--muted); font-size: 12px; margin-left: 6px; white-space: nowrap; }
    .table-wrap { overflow: auto; max-height: 50vh; }
    .account-charts, .activity-charts, .client-product-charts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .client-product-charts { grid-template-columns: 1fr; }
    .account-toolbar { margin-top: 14px; margin-bottom: 0; }
    .mini-chart { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .mini-chart h2 { margin: 0; padding: 12px 14px 0; font-size: 15px; letter-spacing: 0; }
    .mini-chart .subhead { margin: 3px 14px 0; color: var(--muted); font-size: 12px; }
    .mini-chart .chart-wrap { padding-top: 6px; }
    .tooltip {
      position: fixed;
      z-index: 10;
      max-width: 260px;
      padding: 9px 10px;
      border-radius: 7px;
      background: rgba(17, 24, 39, 0.94);
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.22);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -100%);
      transition: opacity 120ms ease;
      white-space: pre-line;
    }
    .tooltip.visible { opacity: 1; }
    @media (max-width: 760px) {
      header { position: static; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .account-charts, .activity-charts, .client-product-charts { grid-template-columns: 1fr; }
      .toolbar input { flex: 1 1 160px; }
      svg { min-width: 960px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>北向结算单持仓看板</h1>
    <div class="meta" id="meta"></div>
  </header>
  <main>
    <section class="metrics" id="metrics"></section>
    <div class="toolbar">
      <label class="field">客户类型
        <select id="clientCategory">
          <option value="all">全部客户</option>
          <option value="normal">普通客户</option>
          <option value="foreign_bank">外资行客户</option>
        </select>
      </label>
      <label class="field">账号层级
        <select id="accountScope">
          <option value="collapsed">折叠子账号</option>
          <option value="expanded">展开子账号</option>
        </select>
      </label>
      <label class="field">市场
        <select id="marketScope">
          <option value="all">全部</option>
          <option value="domestic">内盘</option>
          <option value="foreign">外盘</option>
        </select>
      </label>
      <label class="field">显示
        <select id="limit">
          <option value="20">Top 20</option>
          <option value="40">Top 40</option>
          <option value="9999">全部</option>
        </select>
      </label>
      <button id="reload">刷新</button>
    </div>
    <section class="filter-summary" id="filterSummary"></section>
    <section class="section-block">
      <h2 class="section-title">主账号持仓名义本金</h2>
      <section class="chart-panel">
        <div class="chart-wrap"><svg id="chart" height="520" role="img"></svg></div>
        <div class="legend">
          <span><i class="swatch" style="background:var(--long)"></i><span id="legendCurrLong"></span></span>
          <span><i class="swatch" style="background:var(--long-soft)"></i><span id="legendPrevLong"></span></span>
          <span><i class="swatch" style="background:var(--short)"></i><span id="legendCurrShort"></span></span>
          <span><i class="swatch" style="background:var(--short-soft)"></i><span id="legendPrevShort"></span></span>
        </div>
      </section>
    </section>
    <section class="section-block">
      <h2 class="section-title">客户资金与浮动盈亏</h2>
      <section class="account-charts">
        <div class="mini-chart">
          <h2 id="navTitle">账号 USD NAV</h2>
          <div class="chart-wrap"><svg id="navChart" height="340" role="img"></svg></div>
        </div>
        <div class="mini-chart">
          <h2 id="fundsTitle">账号 Available Funds</h2>
          <div class="chart-wrap"><svg id="fundsChart" height="340" role="img"></svg></div>
        </div>
        <div class="mini-chart">
          <h2 id="pnlTitle">账号 PnL Float</h2>
          <div class="chart-wrap"><svg id="pnlChart" height="340" role="img"></svg></div>
        </div>
      </section>
    </section>
    <section class="section-block">
      <h2 class="section-title">累计现金流与 Commission</h2>
      <section class="activity-charts">
        <div class="mini-chart">
          <h2>累计入金 / 出金 / PnL Settlement</h2>
          <div class="chart-wrap"><svg id="cashflowChart" height="360" role="img"></svg></div>
        </div>
        <div class="mini-chart">
          <h2>客户累计 Commission</h2>
          <div class="chart-wrap"><svg id="clientCommissionChart" height="360" role="img"></svg></div>
        </div>
        <div class="mini-chart">
          <h2>品种累计 Commission</h2>
          <div class="chart-wrap"><svg id="productCommissionChart" height="360" role="img"></svg></div>
        </div>
      </section>
    </section>
    <section class="section-block">
      <h2 class="section-title">客户-品种风险与收益</h2>
      <section class="activity-charts">
        <div class="mini-chart">
          <h2>客户 + 品种 + PnL Float</h2>
          <div class="chart-wrap"><svg id="clientProductPnlFloatChart" height="420" role="img"></svg></div>
        </div>
        <div class="mini-chart">
          <h2>客户 + 品种 + 总收益</h2>
          <div class="chart-wrap"><svg id="clientProductRevenueChart" height="420" role="img"></svg></div>
        </div>
        <div class="mini-chart">
          <h2>客户 + 品种 + Commission</h2>
          <div class="chart-wrap"><svg id="clientProductCommissionChart" height="420" role="img"></svg></div>
        </div>
      </section>
    </section>
    <section class="section-block">
      <h2 class="section-title">分客户总交易量与总 Commission</h2>
      <section class="client-product-charts" id="clientProductCharts"></section>
    </section>
    <section class="section-block">
      <h2 class="section-title">品种持仓明细</h2>
      <section class="table-panel">
        <div class="table-wrap">
          <table>
            <thead id="productTableHead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <div class="tooltip" id="tooltip"></div>
  <script>
    let raw = null;
    const expandedProducts = new Set();
    const fmt = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
    const money = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
    const $ = (id) => document.getElementById(id);
    const tooltip = $("tooltip");

    function accountMeta(account) {
      return raw.account_metadata?.[account] || {
        account,
        client_name: "",
        account_type: "sub",
        client_category: "normal",
        parent_account: "",
        parent_name: "",
      };
    }

    function accountAllowed(account) {
      const meta = accountMeta(String(account));
      const category = $("clientCategory").value;
      const scope = $("accountScope").value;
      if (category !== "all" && meta.client_category !== category) return false;
      if (scope === "expanded") return meta.account_type === "sub" || !hasChildren(String(account));
      if (scope === "collapsed") {
        return true;
      }
      return true;
    }

    function scopedAccount(account) {
      const meta = accountMeta(String(account));
      if ($("accountScope").value === "collapsed" && meta.parent_account) return meta.parent_account;
      return String(account);
    }

    function hasChildren(account) {
      return Object.values(raw.account_metadata || {}).some(meta => meta.parent_account === account);
    }

    function currentView() {
      const market = $("marketScope").value;
      const accountScope = $("accountScope").value;
      const category = $("clientCategory").value;
      return raw.views?.[market]?.[accountScope]?.[category] || raw.views?.all?.collapsed?.all;
    }

    async function load() {
      const res = await fetch("statement_dashboard_data.json?ts=" + Date.now());
      raw = await res.json();
      render();
    }

    function filteredProducts() {
      const limit = Number($("limit").value);
      return currentView().products
        .slice(0, limit);
    }

    function render() {
      const view = currentView();
      const scopeLabel = raw.market_views?.[$("marketScope").value] || "全部";
      const accountScopeLabel = raw.account_scope_views?.[$("accountScope").value] || "全部账号";
      const categoryLabel = raw.client_category_views?.[$("clientCategory").value] || "全部客户";
      renderStaticLabels();
      $("meta").innerHTML = `
        <span>对比日期：T-1 ${raw.dates.later}，T-2 ${raw.dates.earlier}</span>
        <span>更新时间：${raw.generated_at}</span>
        <span>名义本金口径：USD，汇率日 ${raw.fx?.rate_date || raw.dates.later}</span>
        <span>市场范围：${scopeLabel}</span>
        <span>客户类型：${categoryLabel}</span>
        <span>账号层级：${accountScopeLabel}</span>
      `;
      $("metrics").innerHTML = `
        <div class="metric"><span>品种数</span><b>${view.summary.product_count}</b></div>
        <div class="metric"><span>T-1 持仓行数</span><b>${fmt.format(view.summary.later_position_rows)}</b></div>
        <div class="metric"><span>T-1 总名义本金(USD)</span><b>${money.format(view.summary.later_gross_notional)}</b></div>
        <div class="metric"><span>多头 / 空头手数</span><b>${fmt.format(view.summary.later_long_lots)} / ${fmt.format(view.summary.later_short_lots)}</b></div>
      `;
      renderFilterSummary();
      drawChart(filteredProducts());
      drawAccountCharts();
      drawActivityCharts();
      drawRiskMatrixCharts();
      drawClientProductCharts();
      drawTable(filteredProducts());
    }

    function accountLabel(account) {
      const meta = accountMeta(account);
      return `${account} ${meta.client_name || ""}`.trim();
    }

    function childVisible(child) {
      const meta = accountMeta(child);
      const category = $("clientCategory").value;
      if (category !== "all" && meta.client_category !== category) return false;
      return true;
    }

    function renderFilterSummary() {
      const category = $("clientCategory").value;
      const scope = $("accountScope").value;
      const groups = Object.values(raw.account_metadata || {})
        .filter(meta => meta.account_type === "main")
        .filter(meta => category === "all" || meta.client_category === category)
        .sort((a, b) => a.account.localeCompare(b.account));
      const cards = groups.map(meta => {
        const children = Object.values(raw.account_metadata || {})
          .filter(child => child.parent_account === meta.account)
          .filter(child => childVisible(child))
          .sort((a, b) => a.account.localeCompare(b.account));
        let tag = "";
        let parentActive = false;
        let childActive = false;
        if (scope === "collapsed") {
          tag = children.length ? "折叠" : "使用";
          parentActive = true;
          childActive = false;
        } else {
          tag = children.length ? "展开" : "使用";
          parentActive = !children.length;
          childActive = true;
        }
        const childPills = children.map(child => `
          <span class="account-pill ${childActive ? "active" : "inactive"}">${escapeHtml(child.account)} ${escapeHtml(child.client_name || "")}</span>
        `).join("");
        return `
          <div class="filter-group">
            <div class="parent-row">
              <strong>${escapeHtml(meta.account)} ${escapeHtml(meta.client_name || "")}</strong>
              <span class="tag">${escapeHtml(tag)}</span>
            </div>
            <div class="account-tree">
              <span class="account-pill ${parentActive ? "active" : "inactive"} ${meta.virtual ? "virtual" : ""}">${escapeHtml(meta.account)} ${escapeHtml(meta.client_name || "")}</span>
              ${childPills}
            </div>
          </div>
        `;
      });
      $("filterSummary").innerHTML = `
        <h2>当前筛选客户</h2>
        <div class="filter-summary-grid">${cards.length ? cards.join("") : '<div class="filter-group"><span class="empty">当前筛选下没有客户</span></div>'}</div>
      `;
    }

    function renderStaticLabels() {
      $("legendCurrLong").textContent = "T-1 多头名义本金";
      $("legendPrevLong").textContent = "T-2 多头名义本金";
      $("legendCurrShort").textContent = "T-1 空头名义本金";
      $("legendPrevShort").textContent = "T-2 空头名义本金";
      $("navTitle").textContent = "账号 USD NAV";
      $("fundsTitle").textContent = "账号 Available Funds";
      $("pnlTitle").textContent = "账号 PnL Float";
      $("productTableHead").innerHTML = `
        <tr>
          <th>品种 / 客户</th>
          <th>T-1 多头本金</th>
          <th>T-2 多头本金</th>
          <th>多头本金变化</th>
          <th>T-1 空头本金</th>
          <th>T-2 空头本金</th>
          <th>空头本金变化</th>
          <th>T-1 多头手数</th>
          <th>T-1 空头手数</th>
          <th>多头手数变化</th>
          <th>空头手数变化</th>
          <th>T-1 总名义本金</th>
        </tr>
      `;
    }

    function valuationRows() {
      const aggregate = (rows) => {
        const map = new Map();
        rows.forEach(row => {
          if (!accountAllowed(row.account)) return;
          const account = scopedAccount(row.account);
          const meta = accountMeta(account);
          const current = map.get(account) || {
            account,
            account_type: meta.account_type,
            client_category: meta.client_category,
            client_name: meta.client_name || row.client_name || "",
            nav: 0,
            available_funds: 0,
            pnl_float: 0,
          };
          current.nav += row.nav || 0;
          current.available_funds += row.available_funds || 0;
          current.pnl_float += row.pnl_float || 0;
          map.set(account, current);
        });
        return map;
      };
      const earlier = aggregate(raw.account_valuations?.earlier || []);
      const later = aggregate(raw.account_valuations?.later || []);
      const accounts = Array.from(new Set([...earlier.keys(), ...later.keys()])).sort();
      return accounts.map(account => ({
        account,
        account_type: accountMeta(account).account_type,
        client_name: accountMeta(account).client_name || (later.get(account) || earlier.get(account) || {}).client_name || "",
        prev: earlier.get(account) || { nav: 0, available_funds: 0, pnl_float: 0 },
        curr: later.get(account) || { nav: 0, available_funds: 0, pnl_float: 0 },
      }));
    }

    function drawMiniGroupedBar(svgId, rows, series, options = {}) {
      const svg = $(svgId);
      const ns = "http://www.w3.org/2000/svg";
      const left = 64, right = 18, top = 18, bottom = 74, groupGap = 16;
      const groupW = Math.max(36, series.length * 12 + 8);
      const width = Math.max(620, left + right + rows.length * (groupW + groupGap));
      const height = Number(svg.getAttribute("height")) || 340;
      const zero = options.signed ? Math.round((height - bottom + top) / 2) : height - bottom;
      const topLimit = top + 10;
      const bottomLimit = height - bottom;
      const maxValue = Math.max(1, ...rows.flatMap(row => series.map(s => Math.abs(s.value(row)))));
      const positiveScale = (zero - topLimit) / maxValue;
      const unsignedScale = (bottomLimit - topLimit) / maxValue;
      svg.setAttribute("width", width);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.innerHTML = "";

      function line(x1, y1, x2, y2, cls) {
        const el = document.createElementNS(ns, "line");
        el.setAttribute("x1", x1); el.setAttribute("y1", y1); el.setAttribute("x2", x2); el.setAttribute("y2", y2);
        el.setAttribute("class", cls); svg.appendChild(el);
      }
      function text(x, y, value, cls, rotate=false) {
        const el = document.createElementNS(ns, "text");
        el.setAttribute("x", x); el.setAttribute("y", y); el.setAttribute("class", cls);
        el.setAttribute("text-anchor", rotate ? "end" : "middle");
        if (rotate) el.setAttribute("transform", `rotate(-45 ${x} ${y})`);
        el.textContent = value; svg.appendChild(el);
      }
      function moveTooltip(event) {
        const x = Math.min(window.innerWidth - 16, Math.max(16, event.clientX));
        const y = Math.min(window.innerHeight - 16, Math.max(40, event.clientY - 14));
        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      }
      function bindMiniTooltip(el, label) {
        const title = document.createElementNS(ns, "title");
        title.textContent = label;
        el.appendChild(title);
        let holdTimer = null;
        const show = (event) => {
          tooltip.textContent = label;
          moveTooltip(event);
          tooltip.classList.add("visible");
        };
        const hide = () => {
          if (holdTimer) clearTimeout(holdTimer);
          holdTimer = null;
          tooltip.classList.remove("visible");
        };
        el.addEventListener("pointerenter", show);
        el.addEventListener("pointermove", moveTooltip);
        el.addEventListener("pointerleave", hide);
        el.addEventListener("pointerdown", (event) => {

    function accountInfoMap() {
      const map = new Map();

      [...(raw.account_valuations?.earlier || []), ...(raw.account_valuations?.later || [])].forEach(row => {
        if (!map.has(row.account) || row.client_name) map.set(row.account, row);
      });
      return map;
    }

    function rowWithClientMeta(row, clientKey = "client") {
      const account = scopedAccount(row[clientKey]);

        ...row,
        account,
        client_name: info.client_name || "",
        account_type: info.account_type || "sub",

    function aggregateClientProductMetric(rows, valueKey) {
      const map = new Map();
      rows.forEach(row => {
        if (!accountAllowed(row.client)) return;
        const client = scopedAccount(row.client);
        const key = `${client}||${row.product}`;
        const current = map.get(key) || { client, product: row.product, value: 0 };
        current.value += row[valueKey] || 0;
        map.set(key, current);
      });
      return Array.from(map.values());

    function drawClientProductCharts() {
      const container = $("clientProductCharts");
      const byClient = new Map();
      (raw.latest_activity?.trade_by_client_product || []).forEach(row => {
        if (!accountAllowed(row.client)) return;
        const account = scopedAccount(row.client);
        const list = byClient.get(account) || [];
        const existing = list.find(item => item.product === row.product);
        if (existing) {
          existing.long_lots += row.long_lots || 0;
          existing.short_lots += row.short_lots || 0;
          existing.pnl_realized += row.pnl_realized || 0;
          existing.commission += row.commission || 0;
        } else {
          list.push({ ...row, client: account });
        }
        byClient.set(account, list);
      });
      const info = accountInfoMap();
      const clients = Array.from(byClient.keys()).sort((a, b) => {
        const aProducts = new Set(byClient.get(a).map(row => row.product)).size;
        const bProducts = new Set(byClient.get(b).map(row => row.product)).size;
        if (bProducts !== aProducts) return bProducts - aProducts;
        const aLots = byClient.get(a).reduce((s, row) => s + Math.abs(row.long_lots || 0) + Math.abs(row.short_lots || 0), 0);
        const bLots = byClient.get(b).reduce((s, row) => s + Math.abs(row.long_lots || 0) + Math.abs(row.short_lots || 0), 0);
        return bLots - aLots;
      });
      container.innerHTML = clients.map(client => `

          <h2>${escapeHtml(client)} ${escapeHtml(info.get(client)?.client_name || "")} 总交易量与总 Commission</h2>

          <div class="legend">

            <span><i class="swatch" style="background:#b42318"></i>空头总交易量</span>
            <span><i class="swatch" style="background:#7c3aed"></i>总 Commission</span>

          .slice(0, 16);
        drawDualAxisClientChart(`clientProduct_${client}`, rows);
      });
    }

      function moveTooltip(event) {

      function accountContributionLines(p, prefix, side) {
        const notionalKey = `${prefix}_${side}_notional`;
        const lotsKey = `${prefix}_${side}_lots`;
        return (p.details || [])
          .filter(d => Math.abs(d[notionalKey] || 0) > 0 || Math.abs(d[lotsKey] || 0) > 0)
          .sort((a, b) => Math.abs(b[notionalKey] || 0) - Math.abs(a[notionalKey] || 0))
          .slice(0, 10)
          .map(d => {

        const lots = p[`${prefix}_${side}_lots`] || 0;
        const contribution = accountContributionLines(p, prefix, side);
        return `${p.product} ${date} ${label}\n名义本金(USD): ${money.format(notional)}\n手数: ${fmt.format(lots)}${contribution.length ? "\n\n账号贡献:\n" + contribution.join("\n") : ""}`;
      }

      [0.25, 0.5, 0.75, 1].forEach(r => {
        const y1 = mid - maxNotional * r * scale;
        const y2 = mid + maxNotional * r * scale;
        line(left, y1, width - right, y1, "grid");
        line(left, y2, width - right, y2, "grid");
        text(34, y1 + 4, money.format(maxNotional * r), "small");
        text(34, y2 + 4, money.format(maxNotional * r), "small");
      });
      line(left, mid, width - right, mid, "axis");

      data.forEach((p, i) => {
        const x = left + i * (groupW + barGap);
        const prevLongH = Math.abs(p.prev_long_notional) * scale;
        const currLongH = Math.abs(p.curr_long_notional) * scale;
        const prevShortH = Math.abs(p.prev_short_notional) * scale;
        const currShortH = Math.abs(p.curr_short_notional) * scale;
        bindTooltip(rect(x, mid - currLongH, 13, currLongH, "#166534", 0.95), chartTooltip(p, "curr", "long", "多头"));
        bindTooltip(rect(x + 15, mid - prevLongH, 13, prevLongH, "#9bd7ad", 0.95), chartTooltip(p, "prev", "long", "多头"));
        bindTooltip(rect(x, mid, 13, currShortH, "#b42318", 0.95), chartTooltip(p, "curr", "short", "空头"));
        bindTooltip(rect(x + 15, mid, 13, prevShortH, "#efaaa4", 0.95), chartTooltip(p, "prev", "short", "空头"));
        text(x + 14, height - 34, p.product, "label", true);
        const lotChanges = [];
        if (p.delta_long_lots !== 0) lotChanges.push("多" + signed(p.delta_long_lots));
        if (p.delta_short_lots !== 0) lotChanges.push("空" + signed(p.delta_short_lots));
        if (lotChanges.length) text(x + 14, mid - 8, lotChanges.join(" "), "lot-tag");
      });
    }

    function signed(n) {
      return (n > 0 ? "+" : "") + fmt.format(n);
    }

    function signedMoney(n) {
      return (n > 0 ? "+" : "") + money.format(n);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function sourceNoteHtml(row) {
      const accounts = (row.accounts || []).map(String).filter(Boolean);
      const sources = accounts.filter(account => account !== String(row.client));
      if (!sources.length) return "";
      return `<span class="source-note" title="该子账号记录来自母账号结算单">来自 ${escapeHtml([...new Set(sources)].join(", "))}</span>`;
    }

    function drawTable(data) {
      const rows = [];
      data.forEach(p => {
        const open = expandedProducts.has(p.product);
        rows.push(`
          <tr class="summary-row" data-product="${escapeHtml(p.product)}">
            <td><button class="expand-btn" type="button" aria-label="展开${escapeHtml(p.product)}">${open ? "−" : "+"}</button>${escapeHtml(p.product)}</td>
            <td title="手数: ${fmt.format(p.curr_long_lots)}">${money.format(p.curr_long_notional)}</td>
            <td title="手数: ${fmt.format(p.prev_long_lots)}">${money.format(p.prev_long_notional)}</td>
            <td>${signedMoney(p.delta_long_notional)}</td>
            <td title="手数: ${fmt.format(p.curr_short_lots)}">${money.format(p.curr_short_notional)}</td>
            <td title="手数: ${fmt.format(p.prev_short_lots)}">${money.format(p.prev_short_notional)}</td>
            <td>${signedMoney(p.delta_short_notional)}</td>
            <td>${fmt.format(p.curr_long_lots)}</td>
            <td>${fmt.format(p.curr_short_lots)}</td>
            <td>${signed(p.delta_long_lots)}</td>
            <td>${signed(p.delta_short_lots)}</td>
            <td>${money.format(p.curr_gross_notional)}</td>
          </tr>
        `);
        if (open) {
          p.details.forEach(d => {
            rows.push(`
              <tr class="detail-row">
                <td><span class="client-pill">${escapeHtml(d.client)}</span>${sourceNoteHtml(d)}</td>
                <td title="手数: ${fmt.format(d.curr_long_lots)}">${money.format(d.curr_long_notional)}</td>
                <td title="手数: ${fmt.format(d.prev_long_lots)}">${money.format(d.prev_long_notional)}</td>
                <td>${signedMoney(d.delta_long_notional)}</td>
                <td title="手数: ${fmt.format(d.curr_short_lots)}">${money.format(d.curr_short_notional)}</td>
                <td title="手数: ${fmt.format(d.prev_short_lots)}">${money.format(d.prev_short_notional)}</td>
                <td>${signedMoney(d.delta_short_notional)}</td>
                <td>${fmt.format(d.curr_long_lots)}</td>
                <td>${fmt.format(d.curr_short_lots)}</td>
                <td>${signed(d.delta_long_lots)}</td>
                <td>${signed(d.delta_short_lots)}</td>
                <td>${money.format(d.curr_gross_notional)}</td>
              </tr>
            `);
          });
        }
      });
      $("tbody").innerHTML = rows.join("");
      document.querySelectorAll(".summary-row").forEach(row => {
        row.addEventListener("click", () => {
          const product = row.dataset.product;
          if (expandedProducts.has(product)) expandedProducts.delete(product);
          else expandedProducts.add(product);
          drawTable(filteredProducts());
        });
      });
    }

    $("clientCategory").addEventListener("change", () => {
      expandedProducts.clear();
      render();
    });
    $("accountScope").addEventListener("change", () => {
      expandedProducts.clear();
      render();
    });
    $("marketScope").addEventListener("change", () => {
      expandedProducts.clear();
      render();
    });
    $("limit").addEventListener("change", render);
    $("reload").addEventListener("click", load);
    load().catch(err => {
      document.body.innerHTML = `<main><h1>加载失败</h1><pre>${err.stack || err}</pre></main>`;
    });
  </script>
</body>
</html>
